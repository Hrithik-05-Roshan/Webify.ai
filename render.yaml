services:
  - type: web
    name: webify-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: webify-ai-backend
    env: node
    buildCommand: npm install
    startCommand: node index.js
    rootDir: server
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET_KEY
        sync: false
